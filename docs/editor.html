<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GB Engineering Tools Live Editor</title>
  <link rel="stylesheet" href="style.css?v=20260629tidybg">
  <style>
    .editor-top{position:sticky;top:0;z-index:50;background:rgba(17,19,18,.95);border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}
    .editor-bar{width:min(1100px,calc(100% - 32px));margin:0 auto;padding:10px 0;display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .editor-bar strong{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:.06em}
    .editor-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .title-edit{display:flex;align-items:center;gap:6px;color:var(--muted);font-family:var(--mono);font-size:11px}
    .title-edit input{width:210px;max-width:44vw;border:1px solid var(--line);background:#0e100f;color:var(--text);padding:8px;font-size:12px}
    .title-edit input:disabled,.url-edit input:disabled{opacity:.55;cursor:not-allowed}
    .edit-btn{border:1px solid var(--line);background:var(--panel);color:var(--text);min-height:34px;padding:0 10px;font-weight:700;cursor:pointer;text-decoration:none}
    .edit-btn:hover{border-color:var(--accent)}.edit-btn.primary{background:var(--accent);border-color:#efbb64;color:#171207}.edit-btn.bad{border-color:#7c453d;color:#ffb2a8}.edit-btn:disabled{opacity:.45;cursor:not-allowed}
    .editor-status{width:min(1100px,calc(100% - 32px));margin:0 auto 10px;color:var(--muted);font-family:var(--mono);font-size:12px}.editor-status:empty{display:none}
    [contenteditable="true"]{outline:1px dashed rgba(230,155,34,.35);outline-offset:3px;border-radius:2px;cursor:text}
    [contenteditable="true"]:focus{outline:2px solid var(--accent);background:rgba(230,155,34,.08)}
    [contenteditable="false"]{outline:none;cursor:default}
    .panel-controls{display:flex;gap:6px;flex-wrap:wrap;margin:-10px 0 12px}.mini-btn{border:1px solid var(--line);background:#101210;color:var(--muted);font-family:var(--mono);font-size:11px;padding:5px 7px;cursor:pointer}.mini-btn:hover{color:var(--text);border-color:var(--accent)}.mini-btn.bad:hover{border-color:#9c4b40;color:#ffb2a8}.mini-btn:disabled{opacity:.4;cursor:not-allowed}
    .url-edit{display:grid;grid-template-columns:130px 1fr;gap:8px;align-items:center;margin-top:8px;width:100%}.url-edit label{font-family:var(--mono);font-size:11px;color:var(--muted)}.url-edit input{width:100%;border:1px solid var(--line);background:#0e100f;color:var(--text);padding:8px;font-size:12px}
    .add-panel{margin-top:14px;border:1px dashed var(--accent);background:rgba(230,155,34,.07);color:var(--text);width:100%;min-height:42px;cursor:pointer;font-weight:800}.add-panel:disabled{opacity:.4;cursor:not-allowed}.dragging{opacity:.45}
    .hide{display:none!important}.tool-list{max-height:520px}.tool-row{position:relative}.fake-link{display:inline-flex;text-decoration:none}
    @media(max-width:820px){.url-edit{grid-template-columns:1fr}.editor-bar{align-items:flex-start}.title-edit input{width:170px}}
  </style>
</head>
<body>
  <div class="bg bg-base"></div><div class="bg bg-topo"></div><div class="bg bg-crosses"></div>

  <div id="editor">
    <div class="editor-top">
      <div class="editor-bar">
        <strong id="editorHeadline">SIGN IN TO MAKE CHANGES</strong>
        <div class="editor-actions">
          <label class="title-edit">Title <input id="siteTitleInput" data-path="site.title" type="text" placeholder="Site title" disabled></label>
          <button class="edit-btn" id="loginBtn">GitHub Login</button>
          <button class="edit-btn" id="loadBtn" disabled>Load</button>
          <button class="edit-btn primary" id="commitBtn" disabled>Commit site.js</button>
          <button class="edit-btn bad" id="logoutBtn" style="display:none">Logout</button>
          <button class="edit-btn" id="leaveBtn">Leave Editor</button>
        </div>
      </div>
      <div class="editor-status" id="status"></div>
    </div>
    <div id="live"></div>
  </div>

  <script src="data/site.js?v=20260629sync"></script>
  <script>
    const DEFAULT_DATA=window.GB_SITE_DATA||{site:{title:'GB Engineering Tools',subtitle:'CAD / Survey / Civil Utilities',githubUrl:'#',standaloneUrl:'#',footerLeft:'GB Engineering Tools',footerRight:'apps.geodeta.us'},nav:{suites:'Suites',tools:'Tools',standalone:'Standalone',admin:'Admin',github:'GitHub'},hero:{kicker:'Production CAD Utility Portal',title:'Surveying and Civil 3D tools without the bloat.',body:'Suite installers for legacy AutoCAD / Land Desktop workflows and modern Civil 3D setups.',primaryButton:'Download Suites',secondaryButton:'Standalone Installers',thirdButton:'Included Tools'},suitesSection:{title:'Suite installers',caption:'centralized deployment packages'},suites:[],toolsSection:{title:'Included tools',caption:'apps, scripts, and workflow helpers'},standalonePanel:{title:'Standalone downloads',description:'Individual installers and scripts stay on the standalone catalog for now.',buttonText:'Open Standalone Catalog',buttonUrl:'#'},toolCatalog:{title:'Tool catalog',rows:[]},adminSection:{title:'Admin editor',caption:'GitHub commit only',note:'Use the live editor to change site text, suite panels, tool rows, and GitHub Release links. Commit site.js to publish changes.'}};
    let data=clean(DEFAULT_DATA), dragType=null, dragIndex=null, githubAuthed=false, canEdit=false, dirty=false;
    function $(id){return document.getElementById(id)}
    function clone(x){return JSON.parse(JSON.stringify(x))}
    function clean(src){src=src||{};const b=clone(DEFAULT_DATA);Object.keys(b).forEach(k=>{if(Array.isArray(b[k]))b[k]=Array.isArray(src[k])?src[k]:b[k];else b[k]=Object.assign(b[k],src[k]||{})});b.suites=Array.isArray(src.suites)?src.suites.map(s=>Object.assign({name:'New Suite',subtitle:'',description:'',tags:[],downloadText:'Download',downloadUrl:'#',notesText:'Release Notes',notesUrl:'#'},s,{tags:Array.isArray(s.tags)?s.tags:[]})):b.suites;b.toolCatalog.rows=src.toolCatalog&&Array.isArray(src.toolCatalog.rows)?src.toolCatalog.rows.map(r=>Object.assign({name:'New Tool',description:''},r)):b.toolCatalog.rows;return b}
    function status(t){$('status').textContent=t||''}
    function markDirty(msg='Unsaved edits. Commit site.js to publish.'){if(!canEdit){status('Sign in with GitHub to make changes.');return}dirty=true;status(msg)}
    function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
    function getPath(p){return p.split('.').reduce((o,k)=>o?o[k]:'',data)}
    function setPath(p,v){const parts=p.split('.');let o=data;while(parts.length>1){const k=parts.shift();if(o[k]==null)o[k]={};o=o[k]}o[parts[0]]=v}
    function ce(){return canEdit?'true':'false'}
    function disabled(){return canEdit?'':' disabled'}
    function editSpan(p,c=''){return `<span class="${c}" contenteditable="${ce()}" data-path="${p}">${esc(getPath(p))}</span>`}
    function editable(tag,p,c=''){return `<${tag} class="${c}" contenteditable="${ce()}" data-path="${p}">${esc(getPath(p))}</${tag}>`}
    function urlInput(label,p){return `<div class="url-edit"><label>${label}</label><input data-path="${p}" value="${esc(getPath(p))}"${disabled()}></div>`}
    function linkButton(textPath,urlPath,primary,label){return `<a class="btn ${primary?'primary':''} fake-link" href="#" onclick="return false">${editSpan(textPath)}</a>${urlInput(label,urlPath)}`}
    function syncTitle(value,source){document.title=(value||'GB Engineering Tools')+' Editor';document.querySelectorAll('[data-path="site.title"]').forEach(el=>{if(el===source)return;if('value' in el)el.value=value||'';else el.textContent=value||''})}
    function updateControls(){
      $('editorHeadline').textContent=canEdit?'LIVE PAGE EDITOR':'SIGN IN TO MAKE CHANGES';
      $('siteTitleInput').disabled=!canEdit;
      $('loadBtn').disabled=!canEdit;
      $('commitBtn').disabled=!(canEdit&&githubAuthed);
    }
    function toSiteJs(){return 'window.GB_SITE_DATA = '+JSON.stringify(data,null,2)+';\n'}
    function parseSiteJs(text){const m=String(text||'').match(/window\.GB_SITE_DATA\s*=\s*([\s\S]*?);\s*$/);if(!m)throw new Error('Could not read latest site.js.');return JSON.parse(m[1])}
    async function fetchLatestSiteData(){const r=await fetch('data/site.js?sync='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('Could not load latest site.js: '+r.status);return parseSiteJs(await r.text())}
    async function loadLatestSiteData(){if(!canEdit){status('Sign in with GitHub to load latest data.');return}if(dirty&&!confirm('You have unsaved edits that are NOT committed. Loading latest site.js will replace them. Continue?'))return;status('Loading latest site.js...');try{data=clean(await fetchLatestSiteData());window.GB_SITE_DATA=data;dirty=false;render();status('Loaded latest site.js.')}catch(e){status(e.message)}}
    function render(){syncTitle(data.site.title);$('live').innerHTML=`<header><nav><a class="brand" href="#" onclick="return false"><div class="mark"></div><div><strong>${editSpan('site.title')}</strong><span>${editSpan('site.subtitle')}</span></div></a><div class="links"><a href="#suites">${editSpan('nav.suites')}</a><a href="#tools">${editSpan('nav.tools')}</a><a href="#standalone">${editSpan('nav.standalone')}</a><a href="#admin">${editSpan('nav.admin')}</a><a href="#">${editSpan('nav.github')}</a></div></nav></header><main class="site"><section class="hero"><div class="kicker">${editSpan('hero.kicker')}</div>${editable('h1','hero.title')}<p class="lead" contenteditable="${ce()}" data-path="hero.body">${esc(data.hero.body)}</p><div class="actions">${linkButton('hero.primaryButton','site.suitesUrl',true,'primary URL')}${linkButton('hero.secondaryButton','site.standaloneUrl',false,'standalone URL')}${linkButton('hero.thirdButton','site.toolsUrl',false,'tools URL')}</div></section><section id="suites"><div class="section-head"><h2 contenteditable="${ce()}" data-path="suitesSection.title">${esc(data.suitesSection.title)}</h2><p contenteditable="${ce()}" data-path="suitesSection.caption">${esc(data.suitesSection.caption)}</p></div><div class="grid" id="suiteGrid">${data.suites.map((s,i)=>suiteCard(s,i)).join('')}</div><button class="add-panel" data-add="suite"${disabled()}>+ Add suite panel</button></section><section id="tools"><div class="section-head"><h2 contenteditable="${ce()}" data-path="toolsSection.title">${esc(data.toolsSection.title)}</h2><p contenteditable="${ce()}" data-path="toolsSection.caption">${esc(data.toolsSection.caption)}</p></div><div class="split"><div class="card" id="standalone"><h3 contenteditable="${ce()}" data-path="standalonePanel.title">${esc(data.standalonePanel.title)}</h3><p contenteditable="${ce()}" data-path="standalonePanel.description">${esc(data.standalonePanel.description)}</p>${linkButton('standalonePanel.buttonText','standalonePanel.buttonUrl',false,'standalone URL')}</div><div class="card"><h3 contenteditable="${ce()}" data-path="toolCatalog.title">${esc(data.toolCatalog.title)}</h3><div class="tool-list">${data.toolCatalog.rows.map((r,i)=>toolRow(r,i)).join('')}</div><button class="add-panel" data-add="tool"${disabled()}>+ Add tool row</button></div></div></section><section id="admin"><div class="section-head"><h2 contenteditable="${ce()}" data-path="adminSection.title">${esc(data.adminSection.title)}</h2><p contenteditable="${ce()}" data-path="adminSection.caption">${esc(data.adminSection.caption)}</p></div><div class="note" contenteditable="${ce()}" data-path="adminSection.note">${esc(data.adminSection.note)}</div></section><footer><span contenteditable="${ce()}" data-path="site.footerLeft">${esc(data.site.footerLeft)}</span><span contenteditable="${ce()}" data-path="site.footerRight">${esc(data.site.footerRight)}</span></footer></main>`;wireDrag();updateControls()}
    function miniControls(t,i){return `<div class="panel-controls"><button class="mini-btn" data-act="up:${t}:${i}"${disabled()}>↑</button><button class="mini-btn" data-act="down:${t}:${i}"${disabled()}>↓</button><button class="mini-btn" data-act="dup:${t}:${i}"${disabled()}>Duplicate</button><button class="mini-btn bad" data-act="remove:${t}:${i}"${disabled()}>Remove</button></div>`}
    function suiteCard(s,i){return `<article class="card" draggable="${canEdit?'true':'false'}" data-drag="suite" data-index="${i}">${miniControls('suite',i)}<h3 contenteditable="${ce()}" data-path="suites.${i}.name">${esc(s.name)}</h3><div class="sub" contenteditable="${ce()}" data-path="suites.${i}.subtitle">${esc(s.subtitle)}</div><p contenteditable="${ce()}" data-path="suites.${i}.description">${esc(s.description)}</p><div class="details" contenteditable="${ce()}" data-tags="suites.${i}.tags">${esc((s.tags||[]).join(', '))}</div><div class="actions">${linkButton(`suites.${i}.downloadText`,`suites.${i}.downloadUrl`,true,'download URL')}${linkButton(`suites.${i}.notesText`,`suites.${i}.notesUrl`,false,'notes URL')}</div></article>`}
    function toolRow(r,i){return `<div class="tool-row" draggable="${canEdit?'true':'false'}" data-drag="tool" data-index="${i}">${miniControls('tool',i)}<strong contenteditable="${ce()}" data-path="toolCatalog.rows.${i}.name">${esc(r.name)}</strong><span contenteditable="${ce()}" data-path="toolCatalog.rows.${i}.description">${esc(r.description)}</span></div>`}
    document.addEventListener('input',e=>{if(!canEdit)return;const p=e.target.getAttribute('data-path'),tags=e.target.getAttribute('data-tags');if(p){const v=e.target.value!==undefined?e.target.value:e.target.textContent;setPath(p,v);if(p==='site.title')syncTitle(v,e.target);markDirty()}if(tags){setPath(tags,e.target.textContent.split(',').map(x=>x.trim()).filter(Boolean));markDirty('Edited tags. Commit site.js to publish.')}});
    document.addEventListener('click',e=>{const add=e.target.getAttribute('data-add'),act=e.target.getAttribute('data-act');if((add||act)&&!canEdit){status('Sign in with GitHub to make changes.');return}if(add==='suite'){data.suites.push({name:'New Suite',subtitle:'Edit subtitle',description:'Edit description here.',tags:['New'],downloadText:'Download Suite',downloadUrl:'#',notesText:'Release Notes',notesUrl:'#'});render();markDirty('Added suite panel. Commit site.js to publish.')}if(add==='tool'){data.toolCatalog.rows.push({name:'New Tool',description:'Edit tool description.'});render();markDirty('Added tool row. Commit site.js to publish.')}if(act)doAct(act)});
    function listFor(t){return t==='suite'?data.suites:data.toolCatalog.rows}
    function doAct(spec){const[a,t,raw]=spec.split(':'),i=Number(raw),l=listFor(t);if(a==='remove')l.splice(i,1);if(a==='dup')l.splice(i+1,0,clone(l[i]));if(a==='up'&&i>0)[l[i-1],l[i]]=[l[i],l[i-1]];if(a==='down'&&i<l.length-1)[l[i+1],l[i]]=[l[i],l[i+1]];render();markDirty('Updated '+t+' layout. Commit site.js to publish.')}
    function wireDrag(){if(!canEdit)return;document.querySelectorAll('[data-drag]').forEach(el=>{el.addEventListener('dragstart',ev=>{dragType=el.dataset.drag;dragIndex=Number(el.dataset.index);el.classList.add('dragging');ev.dataTransfer.effectAllowed='move'});el.addEventListener('dragend',()=>el.classList.remove('dragging'));el.addEventListener('dragover',ev=>ev.preventDefault());el.addEventListener('drop',ev=>{ev.preventDefault();if(el.dataset.drag!==dragType)return;const to=Number(el.dataset.index),l=listFor(dragType),item=l.splice(dragIndex,1)[0];l.splice(to,0,item);render();markDirty('Dragged '+dragType+' into place. Commit site.js to publish.')})})}
    async function refreshGitHub(){status('Checking GitHub sign-in...');try{const r=await fetch('/api/github/me',{credentials:'include'}),j=await r.json();if(j.authenticated&&j.allowed){githubAuthed=true;canEdit=true;$('loginBtn').style.display='none';$('logoutBtn').style.display='';render();status('GitHub connected as '+j.login+'. Editing unlocked.')}else{githubAuthed=false;canEdit=false;$('loginBtn').style.display='';$('logoutBtn').style.display='none';render();if(j.authenticated)status('GitHub user mismatch. Expected '+j.allowedLogin+', got '+j.login+'.');else status('Sign in with GitHub to make changes.')}}catch(e){githubAuthed=false;canEdit=false;$('loginBtn').style.display='';$('logoutBtn').style.display='none';render();status('OAuth backend not available yet.')}}
    async function commitGitHub(){if(!githubAuthed||!canEdit){status('Sign in with GitHub first.');return}status('Committing site.js...');try{const r=await fetch('/api/github/save-site',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:toSiteJs(),message:'Update site data from live editor'})}),j=await r.json();if(!r.ok||!j.ok)throw new Error(j.error||'GitHub save failed');dirty=false;status('Committed: '+String(j.commit||'').slice(0,7)+'. Wait for Cloudflare deploy; public site will notify visitors after it sees the update.')}catch(e){status(e.message)}}
    function leaveEditor(){if(dirty&&!confirm('You have unsaved edits that are NOT committed to GitHub. Leave editor anyway?'))return;dirty=false;window.location.href='index.html'}
    window.addEventListener('beforeunload',e=>{if(!dirty)return;e.preventDefault();e.returnValue=''})
    $('loginBtn').onclick=()=>{dirty=false;location.href='/api/github/login'}
    $('loadBtn').onclick=loadLatestSiteData
    $('logoutBtn').onclick=()=>{if(dirty&&!confirm('You have unsaved edits. Logout will leave/reload this page. Continue?'))return;dirty=false;location.href='/api/github/logout'}
    $('commitBtn').onclick=commitGitHub
    $('leaveBtn').onclick=leaveEditor
    function boot(){render();refreshGitHub()}boot();
  </script>
</body>
</html>
