<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GB Engineering Tools Live Editor</title>
  <link rel="stylesheet" href="style.css?v=20260627b">
  <style>
    .editor-top{position:sticky;top:0;z-index:50;background:rgba(17,19,18,.95);border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}.editor-bar{width:min(1100px,calc(100% - 32px));margin:0 auto;padding:10px 0;display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}.editor-bar strong{font-family:var(--mono);font-size:13px;color:var(--accent)}.editor-actions{display:flex;gap:8px;flex-wrap:wrap}.edit-btn{border:1px solid var(--line);background:var(--panel);color:var(--text);min-height:34px;padding:0 10px;font-weight:700;cursor:pointer;text-decoration:none}.edit-btn:hover{border-color:var(--accent)}.edit-btn.primary{background:var(--accent);border-color:#efbb64;color:#171207}.edit-btn.bad{border-color:#7c453d;color:#ffb2a8}.edit-btn:disabled{opacity:.45;cursor:not-allowed}.editor-status{width:min(1100px,calc(100% - 32px));margin:0 auto 10px;color:var(--muted);font-family:var(--mono);font-size:12px}.hint{width:min(1100px,calc(100% - 32px));margin:0 auto 10px;color:var(--muted);font-family:var(--mono);font-size:12px}[contenteditable="true"]{outline:1px dashed rgba(230,155,34,.35);outline-offset:3px;border-radius:2px;cursor:text}[contenteditable="true"]:focus{outline:2px solid var(--accent);background:rgba(230,155,34,.08)}.panel-controls{display:flex;gap:6px;flex-wrap:wrap;margin:-10px 0 12px}.mini-btn{border:1px solid var(--line);background:#101210;color:var(--muted);font-family:var(--mono);font-size:11px;padding:5px 7px;cursor:pointer}.mini-btn:hover{color:var(--text);border-color:var(--accent)}.mini-btn.bad:hover{border-color:#9c4b40;color:#ffb2a8}.url-edit{display:grid;grid-template-columns:130px 1fr;gap:8px;align-items:center;margin-top:8px;width:100%}.url-edit label{font-family:var(--mono);font-size:11px;color:var(--muted)}.url-edit input{width:100%;border:1px solid var(--line);background:#0e100f;color:var(--text);padding:8px;font-size:12px}.add-panel{margin-top:14px;border:1px dashed var(--accent);background:rgba(230,155,34,.07);color:var(--text);width:100%;min-height:42px;cursor:pointer;font-weight:800}.dragging{opacity:.45}.locked{min-height:100vh;display:grid;place-items:center;position:relative;z-index:2}.locked-card{border:1px solid var(--line);background:var(--panel);padding:24px;width:min(440px,calc(100% - 32px))}.locked-card h1{font-size:32px;line-height:1;margin:8px 0 12px}.locked-card input{width:100%;border:1px solid var(--line);background:#0e100f;color:var(--text);padding:10px;margin:10px 0}.hide{display:none!important}.tool-list{max-height:520px}.tool-row{position:relative}.fake-link{display:inline-flex;text-decoration:none}@media(max-width:820px){.url-edit{grid-template-columns:1fr}.editor-bar{align-items:flex-start}}
  </style>
</head>
<body>
  <div class="bg bg-base"></div><div class="bg bg-topo"></div><div class="bg bg-crosses"></div>

  <div id="locked" class="locked">
    <div class="locked-card">
      <div class="kicker">GB Engineering Tools</div>
      <h1>Live editor locked</h1>
      <p class="lead" style="font-size:15px;margin:0 0 10px">Open with <b>editor.html?code=gbadmin</b>, or enter the code.</p>
      <input id="codeInput" type="password" placeholder="URL code">
      <button class="edit-btn primary" id="unlockBtn">Unlock</button>
      <a class="edit-btn" href="index.html" style="margin-left:8px">Back</a>
    </div>
  </div>

  <div id="editor" class="hide">
    <div class="editor-top">
      <div class="editor-bar">
        <strong>LIVE PAGE EDITOR — edit, then commit to GitHub</strong>
        <div class="editor-actions">
          <button class="edit-btn" id="loginBtn">GitHub Login</button>
          <button class="edit-btn primary" id="commitBtn" disabled>Commit site.js</button>
          <button class="edit-btn bad" id="logoutBtn" style="display:none">Logout</button>
          <button class="edit-btn" id="leaveBtn">Leave Editor</button>
        </div>
      </div>
      <div class="hint">No local saves. Changes exist only on this page until you click Commit site.js. Reloading or leaving with unsaved edits will ask first.</div>
      <div class="editor-status" id="status">Ready.</div>
    </div>
    <div id="live"></div>
  </div>

  <script src="data/site.js?v=20260627b"></script>
  <script>
    const VALID_CODES=['gbadmin','pop123'];
    const DEFAULT_DATA=window.GB_SITE_DATA||{site:{title:'GB Engineering Tools',subtitle:'CAD / Survey / Civil Utilities',githubUrl:'#',standaloneUrl:'#',footerLeft:'GB Engineering Tools',footerRight:'apps.geodeta.us'},nav:{suites:'Suites',tools:'Tools',standalone:'Standalone',admin:'Admin',github:'GitHub'},hero:{kicker:'Production CAD Utility Portal',title:'Surveying and Civil 3D tools without the bloat.',body:'Suite installers for legacy AutoCAD / Land Desktop workflows and modern Civil 3D setups.',primaryButton:'Download Suites',secondaryButton:'Standalone Installers',thirdButton:'Included Tools'},suitesSection:{title:'Suite installers',caption:'centralized deployment packages'},suites:[],toolsSection:{title:'Included tools',caption:'apps, scripts, and workflow helpers'},standalonePanel:{title:'Standalone downloads',description:'Individual installers and scripts stay on the standalone catalog for now.',buttonText:'Open Standalone Catalog',buttonUrl:'#'},toolCatalog:{title:'Tool catalog',rows:[]},adminSection:{title:'Admin editor',caption:'GitHub commit only',note:'Use the live editor to change site text, suite panels, tool rows, and GitHub Release links. Commit site.js to publish changes.'}};
    let data=clean(DEFAULT_DATA);let dragType=null;let dragIndex=null;let githubAuthed=false;let dirty=false;
    function $(id){return document.getElementById(id)}function clone(x){return JSON.parse(JSON.stringify(x))}
    function clean(src){src=src||{};const b=clone(DEFAULT_DATA);Object.keys(b).forEach(k=>{if(Array.isArray(b[k]))b[k]=Array.isArray(src[k])?src[k]:b[k];else b[k]=Object.assign(b[k],src[k]||{})});b.suites=Array.isArray(src.suites)?src.suites.map(s=>Object.assign({name:'New Suite',subtitle:'',description:'',tags:[],downloadText:'Download',downloadUrl:'#',notesText:'Release Notes',notesUrl:'#'},s,{tags:Array.isArray(s.tags)?s.tags:[]})):b.suites;b.toolCatalog.rows=src.toolCatalog&&Array.isArray(src.toolCatalog.rows)?src.toolCatalog.rows.map(r=>Object.assign({name:'New Tool',description:''},r)):b.toolCatalog.rows;return b}
    function status(t){$('status').textContent=t}function markDirty(msg='Unsaved edits. Commit site.js to publish.'){dirty=true;status(msg)}
    function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
    function getPath(p){return p.split('.').reduce((o,k)=>o?o[k]:'',data)}function setPath(p,v){const parts=p.split('.');let o=data;while(parts.length>1){const k=parts.shift();if(o[k]==null)o[k]={};o=o[k]}o[parts[0]]=v}
    function editSpan(p,c=''){return `<span class="${c}" contenteditable="true" data-path="${p}">${esc(getPath(p))}</span>`}function editable(tag,p,c=''){return `<${tag} class="${c}" contenteditable="true" data-path="${p}">${esc(getPath(p))}</${tag}>`}
    function urlInput(label,p){return `<div class="url-edit"><label>${label}</label><input data-path="${p}" value="${esc(getPath(p))}"></div>`}function linkButton(textPath,urlPath,primary,label){return `<a class="btn ${primary?'primary':''} fake-link" href="#" onclick="return false">${editSpan(textPath)}</a>${urlInput(label,urlPath)}`}
    function toSiteJs(){return 'window.GB_SITE_DATA = '+JSON.stringify(data,null,2)+';\n'}window.toSiteJs=toSiteJs;
    function render(){document.title=data.site.title||'GB Engineering Tools Editor';$('live').innerHTML=`<header><nav><a class="brand" href="#" onclick="return false"><div class="mark"></div><div><strong>${editSpan('site.title')}</strong><span>${editSpan('site.subtitle')}</span></div></a><div class="links"><a href="#suites">${editSpan('nav.suites')}</a><a href="#tools">${editSpan('nav.tools')}</a><a href="#standalone">${editSpan('nav.standalone')}</a><a href="#admin">${editSpan('nav.admin')}</a><a href="#">${editSpan('nav.github')}</a></div></nav></header><main class="site"><section class="hero"><div class="kicker">${editSpan('hero.kicker')}</div>${editable('h1','hero.title')}<p class="lead" contenteditable="true" data-path="hero.body">${esc(data.hero.body)}</p><div class="actions">${linkButton('hero.primaryButton','site.suitesUrl',true,'primary URL')}${linkButton('hero.secondaryButton','site.standaloneUrl',false,'standalone URL')}${linkButton('hero.thirdButton','site.toolsUrl',false,'tools URL')}</div></section><section id="suites"><div class="section-head"><h2 contenteditable="true" data-path="suitesSection.title">${esc(data.suitesSection.title)}</h2><p contenteditable="true" data-path="suitesSection.caption">${esc(data.suitesSection.caption)}</p></div><div class="grid" id="suiteGrid">${data.suites.map((s,i)=>suiteCard(s,i)).join('')}</div><button class="add-panel" data-add="suite">+ Add suite panel</button></section><section id="tools"><div class="section-head"><h2 contenteditable="true" data-path="toolsSection.title">${esc(data.toolsSection.title)}</h2><p contenteditable="true" data-path="toolsSection.caption">${esc(data.toolsSection.caption)}</p></div><div class="split"><div class="card" id="standalone"><h3 contenteditable="true" data-path="standalonePanel.title">${esc(data.standalonePanel.title)}</h3><p contenteditable="true" data-path="standalonePanel.description">${esc(data.standalonePanel.description)}</p>${linkButton('standalonePanel.buttonText','standalonePanel.buttonUrl',false,'standalone URL')}</div><div class="card"><h3 contenteditable="true" data-path="toolCatalog.title">${esc(data.toolCatalog.title)}</h3><div class="tool-list">${data.toolCatalog.rows.map((r,i)=>toolRow(r,i)).join('')}</div><button class="add-panel" data-add="tool">+ Add tool row</button></div></div></section><section id="admin"><div class="section-head"><h2 contenteditable="true" data-path="adminSection.title">${esc(data.adminSection.title)}</h2><p contenteditable="true" data-path="adminSection.caption">${esc(data.adminSection.caption)}</p></div><div class="note" contenteditable="true" data-path="adminSection.note">${esc(data.adminSection.note)}</div></section><footer><span contenteditable="true" data-path="site.footerLeft">${esc(data.site.footerLeft)}</span><span contenteditable="true" data-path="site.footerRight">${esc(data.site.footerRight)}</span></footer></main>`;wireDrag()}
    function suiteCard(s,i){return `<article class="card" draggable="true" data-drag="suite" data-index="${i}"><div class="panel-controls"><button class="mini-btn" data-act="up:suite:${i}">↑</button><button class="mini-btn" data-act="down:suite:${i}">↓</button><button class="mini-btn" data-act="dup:suite:${i}">Duplicate</button><button class="mini-btn bad" data-act="remove:suite:${i}">Remove</button></div><h3 contenteditable="true" data-path="suites.${i}.name">${esc(s.name)}</h3><div class="sub" contenteditable="true" data-path="suites.${i}.subtitle">${esc(s.subtitle)}</div><p contenteditable="true" data-path="suites.${i}.description">${esc(s.description)}</p><div class="details" contenteditable="true" data-tags="suites.${i}.tags">${esc((s.tags||[]).join(', '))}</div><div class="actions">${linkButton(`suites.${i}.downloadText`,`suites.${i}.downloadUrl`,true,'download URL')}${linkButton(`suites.${i}.notesText`,`suites.${i}.notesUrl`,false,'notes URL')}</div></article>`}
    function toolRow(r,i){return `<div class="tool-row" draggable="true" data-drag="tool" data-index="${i}"><div class="panel-controls"><button class="mini-btn" data-act="up:tool:${i}">↑</button><button class="mini-btn" data-act="down:tool:${i}">↓</button><button class="mini-btn" data-act="dup:tool:${i}">Duplicate</button><button class="mini-btn bad" data-act="remove:tool:${i}">Remove</button></div><strong contenteditable="true" data-path="toolCatalog.rows.${i}.name">${esc(r.name)}</strong><span contenteditable="true" data-path="toolCatalog.rows.${i}.description">${esc(r.description)}</span></div>`}
    document.addEventListener('input',e=>{const p=e.target.getAttribute('data-path'),tags=e.target.getAttribute('data-tags');if(p){setPath(p,e.target.value!==undefined?e.target.value:e.target.textContent);markDirty()}if(tags){setPath(tags,e.target.textContent.split(',').map(x=>x.trim()).filter(Boolean));markDirty('Edited tags. Commit site.js to publish.')}});
    document.addEventListener('click',e=>{const add=e.target.getAttribute('data-add'),act=e.target.getAttribute('data-act');if(add==='suite'){data.suites.push({name:'New Suite',subtitle:'Edit subtitle',description:'Edit description here.',tags:['New'],downloadText:'Download Suite',downloadUrl:'#',notesText:'Release Notes',notesUrl:'#'});render();markDirty('Added suite panel. Commit site.js to publish.')}if(add==='tool'){data.toolCatalog.rows.push({name:'New Tool',description:'Edit tool description.'});render();markDirty('Added tool row. Commit site.js to publish.')}if(act)doAct(act)});
    function listFor(t){return t==='suite'?data.suites:data.toolCatalog.rows}function doAct(spec){const[a,t,raw]=spec.split(':'),i=Number(raw),l=listFor(t);if(a==='remove')l.splice(i,1);if(a==='dup')l.splice(i+1,0,clone(l[i]));if(a==='up'&&i>0)[l[i-1],l[i]]=[l[i],l[i-1]];if(a==='down'&&i<l.length-1)[l[i+1],l[i]]=[l[i],l[i+1]];render();markDirty('Updated '+t+' layout. Commit site.js to publish.')}
    function wireDrag(){document.querySelectorAll('[data-drag]').forEach(el=>{el.addEventListener('dragstart',ev=>{dragType=el.dataset.drag;dragIndex=Number(el.dataset.index);el.classList.add('dragging');ev.dataTransfer.effectAllowed='move'});el.addEventListener('dragend',()=>el.classList.remove('dragging'));el.addEventListener('dragover',ev=>ev.preventDefault());el.addEventListener('drop',ev=>{ev.preventDefault();if(el.dataset.drag!==dragType)return;const to=Number(el.dataset.index),l=listFor(dragType),item=l.splice(dragIndex,1)[0];l.splice(to,0,item);render();markDirty('Dragged '+dragType+' into place. Commit site.js to publish.')})})}
    async function refreshGitHub(){try{const r=await fetch('/api/github/me',{credentials:'include'}),j=await r.json();if(j.authenticated&&j.allowed){githubAuthed=true;$('loginBtn').style.display='none';$('logoutBtn').style.display='';$('commitBtn').disabled=false;status('GitHub connected as '+j.login+'.')}else if(j.authenticated){status('GitHub user mismatch. Expected '+j.allowedLogin+', got '+j.login+'.')}else status('GitHub not connected. Login before committing.')}catch(e){status('OAuth backend not available yet.')}}
    async function commitGitHub(){if(!githubAuthed){status('Login to GitHub first.');return}status('Committing site.js...');try{const r=await fetch('/api/github/save-site',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:toSiteJs(),message:'Update site data from live editor'})}),j=await r.json();if(!r.ok||!j.ok)throw new Error(j.error||'GitHub save failed');dirty=false;status('Committed: '+String(j.commit||'').slice(0,7)+'. Wait for Cloudflare deploy, then refresh public site.')}catch(e){status(e.message)}}
    function leaveEditor(){if(dirty&&!confirm('You have unsaved edits that are NOT committed to GitHub. Leave editor anyway?'))return;dirty=false;window.location.href='index.html'}
    window.addEventListener('beforeunload',e=>{if(!dirty)return;e.preventDefault();e.returnValue=''});
    $('unlockBtn').onclick=()=>{const c=$('codeInput').value.trim();if(VALID_CODES.includes(c))location.href='editor.html?code='+encodeURIComponent(c)};$('loginBtn').onclick=()=>{if(dirty&&!confirm('You have unsaved edits. Login will leave/reload this page. Continue?'))return;dirty=false;location.href='/api/github/login'};$('logoutBtn').onclick=()=>{if(dirty&&!confirm('You have unsaved edits. Logout will leave/reload this page. Continue?'))return;dirty=false;location.href='/api/github/logout'};$('commitBtn').onclick=commitGitHub;$('leaveBtn').onclick=leaveEditor;
    function boot(){const code=new URLSearchParams(location.search).get('code')||'';if(!VALID_CODES.includes(code))return;$('locked').classList.add('hide');$('editor').classList.remove('hide');render();refreshGitHub()}boot();
  </script>
</body>
</html>
