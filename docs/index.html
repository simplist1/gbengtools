<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GB Engineering Tools</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg bg-base"></div>
  <div class="bg bg-topo"></div>
  <div class="bg bg-crosses"></div>

  <header>
    <nav>
      <a class="brand" href="#">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <strong id="brandTitle"></strong>
          <span id="brandSubtitle"></span>
        </div>
      </a>
      <div class="links">
        <a href="#suites" id="navSuites"></a>
        <a href="#tools" id="navTools"></a>
        <a href="#standalone" id="navStandalone"></a>
        <a href="editor.html?code=gbadmin" id="navAdmin"></a>
        <a href="#" id="navGithub" target="_blank" rel="noopener"></a>
      </div>
    </nav>
  </header>

  <main class="site">
    <section class="hero">
      <div class="kicker" id="heroKicker"></div>
      <h1 id="heroTitle"></h1>
      <p class="lead" id="heroBody"></p>
      <div class="actions">
        <a class="btn primary" href="#suites" id="heroPrimary"></a>
        <a class="btn" href="#standalone" id="heroSecondary"></a>
        <a class="btn" href="#tools" id="heroThird"></a>
      </div>
    </section>

    <section id="suites">
      <div class="section-head">
        <h2 id="suitesTitle"></h2>
        <p id="suitesCaption"></p>
      </div>
      <div class="grid" id="suiteGrid"></div>
    </section>

    <section id="tools">
      <div class="section-head">
        <h2 id="toolsTitle"></h2>
        <p id="toolsCaption"></p>
      </div>
      <div class="split">
        <div class="card" id="standalone">
          <h3 id="standaloneTitle"></h3>
          <p id="standaloneDescription"></p>
          <a class="btn" href="#" id="standaloneButton"></a>
        </div>
        <div class="card">
          <h3 id="toolCatalogTitle"></h3>
          <div class="tool-list" id="toolList"></div>
        </div>
      </div>
    </section>

    <section id="admin">
      <div class="section-head">
        <h2 id="adminTitle"></h2>
        <p id="adminCaption"></p>
      </div>
      <div class="note" id="adminNote"></div>
    </section>

    <footer>
      <span id="footerLeft"></span>
      <span id="footerRight"></span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
