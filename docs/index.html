<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GB Engineering Tools</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: #e9e9e9;
      color: #111;
    }

    .card {
      width: min(90vw, 520px);
      padding: 32px;
      text-align: center;
      background: #fff;
      border: 1px solid #bbb;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 30px;
    }

    p {
      margin: 0 0 24px;
      color: #444;
    }

    a {
      display: inline-block;
      padding: 12px 18px;
      border: 1px solid #333;
      background: #333;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      background: #111;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>GB Engineering Tools</h1>
    <p>AutoCAD, Civil 3D, and Land Desktop apps and scripts.</p>
    <a href="apps/">Open Apps Page</a>
  </main>
</body>
</html>
